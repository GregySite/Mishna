<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Ouverture Application</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
            text-align: center;
            padding: 0 20px;
        }
        .app-button {
            display: inline-block;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .app-button:active {
            background-color: #0056b3;
        }
        .warning {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <h1>Test du lien d'intention</h1>
    
    <a href="intent://#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=com.nocker.kehati;end" class="app-button">
        Ouvrir Kehati
    </a>

    <p class="warning">
        ⚠️ <b>Rappel :</b> Ce bouton ne fonctionnera que si cette page est ouverte depuis un navigateur Android (comme Chrome) et que l'application est déjà installée sur le téléphone.
    </p>

</body>
</html>
