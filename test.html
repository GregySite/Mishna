<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לימוד משנה יומי</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23b5832a'/><text x='16' y='23' text-anchor='middle' font-family='serif' font-size='22' font-weight='bold' fill='white'>מ</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Secular+One&family=Noto+Serif+Hebrew:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #f7f3ee;
    --bg2:        #efe9e0;
    --card:       #ffffff;
    --card-hover: #fdfaf6;
    --border:     #e0d5c5;
    --border-acc: #c8a96e;
    --gold:       #b5832a;
    --gold-light: #d4a84b;
    --gold-pale:  #f5ecd8;
    --ink:        #1a1208;
    --ink-mid:    #4a3c28;
    --ink-dim:    #9a8a72;
    --ink-faint:  #c8bca8;
    --green:      #8b5e2a;
    --green-bg:   #f5ede0;
    --green-brd:  #d4a870;
    --red:        #b03030;
    --red-bg:     #fdf0f0;
    --accent:     #3a6ea8;
    --accent-bg:  #f5ede0;
    --shadow-sm:  0 1px 4px rgba(90,65,30,0.08);
    --shadow-md:  0 3px 12px rgba(90,65,30,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif Hebrew', 'Frank Ruhl Libre', serif;
    background-color: var(--bg);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(181,131,42,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(58,110,168,0.06) 0%, transparent 50%);
    min-height: 100vh;
    padding: 20px 16px 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* Subtle stars — visible but light against cream */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 12%, rgba(181,131,42,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 6%,  rgba(181,131,42,0.4)  0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 38% 20%, rgba(181,131,42,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 53% 4%,  rgba(181,131,42,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 16%, rgba(181,131,42,0.55) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 9%, rgba(181,131,42,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 23%, rgba(181,131,42,0.4)  0%, transparent 100%),
      radial-gradient(1px 1px at 6%  38%, rgba(181,131,42,0.3)  0%, transparent 100%),
      radial-gradient(1px 1px at 14% 52%, rgba(181,131,42,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 87% 48%, rgba(181,131,42,0.4)  0%, transparent 100%),
      radial-gradient(1px 1px at 94% 68%, rgba(181,131,42,0.3)  0%, transparent 100%),
      radial-gradient(1px 1px at 28% 73%, rgba(181,131,42,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 58% 83%, rgba(181,131,42,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 74% 90%, rgba(181,131,42,0.3)  0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    max-width: 820px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .site-header {
    text-align: center;
    padding: 4px 16px 8px;
  }

  /* Big decorative Hebrew letter ש as ornament */
  .header-ornament {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 3.6rem;
    font-weight: 900;
    color: var(--gold-light);
    opacity: 0.18;
    display: block;
    line-height: 1;
    margin-bottom: -18px;
    letter-spacing: 0;
    user-select: none;
  }

  .site-header h1 {
    font-family: 'Secular One', sans-serif;
    font-size: clamp(1.7rem, 5vw, 2.6rem);
    color: var(--ink);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    position: relative;
  }

  .site-header .subtitle {
    font-size: 0.9rem;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }

  .header-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 0;
    color: var(--gold);
    font-size: 0.75rem;
    opacity: 0.6;
  }
  .header-divider::before, .header-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-acc), transparent);
  }

  /* ── GLOBAL CARD ── */
  .global-card {
    background: var(--card);
    border: 1px solid var(--border-acc);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }

  /* decorative corner aleph */
  .global-card::before {
    content: 'א';
    position: absolute;
    left: 12px; top: 4px;
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--gold-light);
    opacity: 0.07;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .global-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .global-label {
    font-family: 'Secular One', sans-serif;
    font-size: 0.95rem;
    color: var(--ink-mid);
    flex-shrink: 0;
  }

  .global-pct {
    font-family: 'Secular One', sans-serif;
    font-size: 1.5rem;
    color: var(--green);
    margin-right: auto;
    font-weight: 700;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 12px;
    background: var(--bg2);
    border-radius: 100px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #6b4420, var(--green));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    position: relative;
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    top: 2px; left: 4px; right: 4px; height: 3px;
    background: rgba(255,255,255,0.35);
    border-radius: 100px;
  }

  .global-stats {
    text-align: center;
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 8px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Noto Serif Hebrew', serif;
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink-mid);
    transition: all 0.18s;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--border-acc);
    color: var(--gold);
    background: var(--gold-pale);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }

  .btn-danger { color: var(--red); border-color: rgba(176,48,48,0.25); }
  .btn-danger:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  /* ── DAY CARDS ── */
  .days-container { display: flex; flex-direction: column; gap: 8px; }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .day-card:hover { border-color: var(--border-acc); box-shadow: var(--shadow-md); }

  .day-card.completed {
    background: var(--green-bg);
    border-color: var(--green-brd);
  }

  .day-card.bookmarked {
    border-color: var(--gold-light);
    box-shadow: 0 0 0 2px rgba(181,131,42,0.15), var(--shadow-md);
  }

  /* ── DAY HEADER ── */
  .day-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 11px 14px;
    cursor: pointer;
    user-select: none;
    width: 100%;
  }

  .day-header:hover { background: rgba(181,131,42,0.03); }

  .day-num {
    font-family: 'Secular One', sans-serif;
    font-size: 0.95rem;
    color: var(--card);
    background: var(--gold);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 700;
  }

  .day-card.completed .day-num {
    background: var(--green);
  }

  .day-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .day-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    line-height: 1.3;
  }

  .day-masechtos-preview {
    font-size: 0.72rem;
    color: var(--ink-faint);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bookmark-badge {
    font-size: 0.62rem;
    background: var(--gold-pale);
    color: var(--gold);
    border: 1px solid rgba(181,131,42,0.35);
    border-radius: 100px;
    padding: 1px 7px;
    white-space: nowrap;
    font-weight: 600;
  }

  .day-pct {
    font-family: 'Secular One', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-dim);
    flex-shrink: 0;
    min-width: 32px;
    text-align: center;
  }

  .day-bar-wrap {
    width: 56px;
    height: 6px;
    background: var(--bg2);
    border-radius: 100px;
    overflow: hidden;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .day-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, #6b4420, var(--green));
    transition: width 0.4s ease;
  }

  .day-cb {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    min-width: 20px;
    border: 2px solid var(--border-acc);
    border-radius: 5px;
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.2s;
  }

  .day-cb:checked { background: var(--green); border-color: var(--green); }
  .day-cb:checked::after {
    content: '✓';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: white; font-size: 12px; font-weight: bold;
  }

  .day-cb:indeterminate { background: var(--gold-pale); border-color: var(--gold); }
  .day-cb:indeterminate::after {
    content: '—';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: var(--gold); font-size: 11px; font-weight: bold;
  }

  .bk-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    padding: 2px;
    opacity: 0.25;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
    line-height: 1;
    display: flex;
    align-items: center;
  }
  .bk-btn:hover, .bk-btn.active { opacity: 1; }
  .bk-btn.active { transform: scale(1.2); }

  .chevron {
    color: var(--ink-faint);
    font-size: 0.65rem;
    transition: transform 0.22s;
    flex-shrink: 0;
    line-height: 1;
    display: flex;
    align-items: center;
  }
  .day-card.open .chevron { transform: rotate(180deg); }

  /* ── DAY BODY ── */
  .day-body {
    display: none;
    padding: 4px 14px 16px;
    border-top: 1px solid var(--border);
  }
  .day-card.open .day-body { display: block; }

  /* ── MASEHET ── */
  .masehet-block { margin-top: 14px; }

  .masehet-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .mas-cb {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    min-width: 18px;
    border: 2px solid var(--border-acc);
    border-radius: 50%;
    background: white;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.2s;
  }

  .mas-cb:checked { background: var(--green); border-color: var(--green); }
  .mas-cb:checked::after {
    content: '✓';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: white; font-size: 11px;
  }

  .mas-cb:indeterminate { background: var(--accent-bg); border-color: var(--accent); }

  .mas-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    flex: 1;
  }

  .mas-count {
    font-size: 0.74rem;
    color: var(--ink-faint);
    flex-shrink: 0;
  }

  .mas-bar-wrap {
    width: 50px;
    height: 5px;
    background: var(--bg2);
    border-radius: 100px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .mas-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--accent), #6aa3d4);
    transition: width 0.3s ease;
  }

  /* ── CHAPTERS ── */
  .chapters-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-right: 26px;
  }

  .ch-item {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 68px;
  }

  .ch-item:hover {
    background: var(--accent-bg);
    border-color: var(--accent);
  }

  .ch-item.done {
    background: var(--green-bg);
    border-color: var(--green-brd);
  }

  .ch-item.done .ch-box { background: var(--green); border-color: var(--green); }
  .ch-item.done .ch-box::after { content: '✓'; color: white; font-size: 10px; }
  .ch-item.done .ch-lbl { color: var(--green); text-decoration: line-through; text-decoration-color: rgba(45,122,79,0.35); }

  .ch-box {
    width: 15px;
    height: 15px;
    min-width: 15px;
    border: 1.5px solid var(--border-acc);
    border-radius: 3px;
    background: white;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .ch-lbl {
    font-size: 0.82rem;
    color: var(--ink-mid);
    white-space: nowrap;
  }

  /* ── MODAL SEFARIA ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--border-acc);
    border-radius: 16px;
    padding: 22px;
    max-width: 560px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow-md);
    position: relative;
  }

  .modal-title {
    font-family: 'Secular One', sans-serif;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--ink-faint);
    padding: 0 4px;
  }

  .mishna-text {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--ink);
    direction: rtl;
    text-align: right;
  }

  .mishna-text .mishna-item {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .mishna-text .mishna-item:last-child { border-bottom: none; }

  .mishna-item-num {
    font-family: 'Secular One', sans-serif;
    font-size: 0.75rem;
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
  }

  .modal-loading {
    text-align: center;
    color: var(--ink-dim);
    padding: 30px;
    font-size: 0.9rem;
  }

  .ch-read-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--accent);
    padding: 0 4px;
    opacity: 0.6;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .ch-read-btn:hover { opacity: 1; }

  /* ── AVANCE / RETARD ── */
  .rhythm-status {
    text-align: center;
    margin-top: 8px;
    font-family: 'Secular One', sans-serif;
    font-size: 0.82rem;
    min-height: 18px;
  }

  .rhythm-ahead {
    color: #2d7a4f;
  }

  .rhythm-behind {
    color: var(--red);
  }

  .rhythm-ok {
    color: var(--ink-dim);
  }

  .rhythm-detail {
    font-family: 'Noto Serif Hebrew', serif;
    font-size: 0.74rem;
    color: var(--ink-faint);
    margin-top: 2px;
  }

  /* ── TODAY + SÉDER ── */
  .day-card.today {
    border-color: var(--border-acc);
    box-shadow: 0 0 0 2px rgba(181,131,42,0.2), var(--shadow-md);
  }

  .today-badge {
    font-size: 0.65rem;
    background: var(--gold);
    color: white;
    border-radius: 100px;
    padding: 1px 7px;
    white-space: nowrap;
    font-weight: 600;
    font-family: 'Secular One', sans-serif;
  }

  .day-seder-line {
    margin-top: 1px;
  }

  .seder-tag {
    color: var(--gold);
    font-weight: 700;
    font-size: 0.72rem;
  }

  /* ── CERCLE SVG SÉDARIM ── */
  .seder-circle-wrap {
    display: flex;
    justify-content: center;
    margin: 18px 0 10px;
  }

  #sederSVG {
    width: 220px;
    height: 220px;
    filter: drop-shadow(0 2px 8px rgba(90,65,30,0.12));
  }

  /* ── ANIMATION COMPLÉTION ── */
  @keyframes confettiFall {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--cx), var(--cy)) rotate(var(--cr)) scale(0.5); opacity: 0; }
  }

  .confetti-piece {
    position: fixed;
    width: 7px;
    height: 7px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall 1.8s ease-out forwards;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border-acc); border-radius: 3px; }

  .header-date {
    font-size: 0.88rem;
    color: var(--ink-dim);
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .header-date-sep { color: var(--ink-faint); }

  @media (max-width: 480px) {
    .day-bar-wrap { width: 40px; }
    .btn { font-size: 0.78rem; padding: 7px 10px; }
    .date-card { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page-wrapper">

  <header class="site-header">
    <span class="header-ornament">מ</span>
    <h1>לימוד משנה יומי</h1>
    <p class="subtitle">מעקב אישי · סדר הש״ס</p>
    <div class="header-date">
      <span id="hebrewDate">…</span>
      <span class="header-date-sep">·</span>
      <span id="sunsetInfo"></span>
    </div>
    <div class="header-divider">◆ ◆ ◆</div>
  </header>

  <div class="global-card">
    <div class="global-top">
      <span class="global-label">התקדמות כללית</span>
      <span class="global-pct" id="globalPct">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="globalBar" style="width:0%"></div>
    </div>

    <!-- Cercle SVG des Sédarim -->
    <div class="seder-circle-wrap">
      <svg id="sederSVG" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
        <!-- Cercle de fond -->
        <circle cx="130" cy="130" r="100" fill="#f7f3ee" stroke="#e0d5c5" stroke-width="1"/>
        <!-- Séparations et arcs générés par JS -->
        <g id="sederArcs"></g>
        <g id="sederLabels"></g>
        <!-- Anneau intérieur décoratif -->
